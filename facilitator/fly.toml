app = "ledgerforge-sol-facilitator"
primary_region = "sin"

[build]

[env]
  FACILITATOR_PORT        = "3001"
  SOLANA_RPC              = "https://api.devnet.solana.com"
  SOLANA_CLUSTER          = "devnet"
  SKILL_REGISTRY_PROGRAM  = "26Xf7wEPJbG6EJ5kfAXbkot75ekSWdvpJH2rws1DEaEF"
  X402_ESCROW_PROGRAM     = "Ec48mwadrna8FC5rJ24K5R5fMVCBFBzhbbeFkf6skiYq"
  BAZAAR_LISTINGS_PROGRAM = "HnnH4asvgvAqyBnZKD6SVPMHEwTPTEBq2ZYU995j4Jt3"
  ALLOWED_MINTS           = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
  FACILITATOR_FEE_BPS     = "20"
  # SOLANA_OPERATOR_SECRET is set via `fly secrets` (not committed).

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
