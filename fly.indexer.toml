app = "chainpipe-indexer"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.indexer"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"

[env]
  INDEXER_PORT = "8080"
  SOLANA_RPC_URL = "https://api.devnet.solana.com"
  CHAINPIPE_USDC_MINT = "8BPRrfsXT3FZUvxW5v5ctq8Q5moZinNu7eFR4gtFPxz1"
  POLL_INTERVAL_MS = "8000"
  INDEXER_STORE = "/data/store.json"

# Durable storage so the index survives restarts without a re-poll gap.
[mounts]
  source = "chainpipe_indexer_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
